<div class="page">

  <div class="topbar">
    <div class="icon-btn">
      <button type="button" (click)="back()">
        <lucide-icon [img]="Undo2" style="top: 10px; left: 10px"></lucide-icon>
      </button>
    </div>

    <div class="title-and-description">
      <span class="title-span-above"></span>
      <div class="title">
        {{ gencount()?.name }}
      </div>
      <div class="description">
        {{ gencount()?.description }}
      </div>
    </div>
  </div>

  <div class="content">
    <div class="left sub-window" [class.dark]="themeService.isDark()">
      @if (gencount()) {
        <expenses-tabs-full-window [gencount]="gencount()!" [partecipants]="users()!"/>
      }
    </div>

    <div class="right sub-window" [class.dark]="themeService.isDark()">
      <div class="section-title">
        PARTECIPANTI
      </div>

      <div class="users-box">
        @for (user of users(); track $index) {
          @if ($index != 0) {
            <div class="member-separator">
            </div>
          }
          <div class="user-line">
            <app-member-card [member]="user"/>
          </div>
        }
      </div>
    </div>
  </div>
</div>
