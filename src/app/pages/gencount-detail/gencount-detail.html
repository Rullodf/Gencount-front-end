<div class="page">

  <div class="header">
    <button class="back" type="button" (click)="back()">
      <lucide-icon [img]="Undo2"></lucide-icon>
    </button>

    <div class="title">
      {{ gencount()?.name }}
    </div>
    <div>
      {{ gencount()?.description }}
    </div>
  </div>

  <div class="content">

    <div class="left">
      <div class="section-title">Lista spese</div>
      <div class="spese-box"></div>
    </div>

    <div class="right">
      <div class="section-title">
        LISTA USERS IN QUESTO GENCOUNT
      </div>

      <div class="users-box">
        @for (user of users(); track user.userId) {
          <div class="user-line">
            <div>{{ user.name }} {{ user.surname }}</div>
          </div>
        }
      </div>
    </div>

  </div>

</div>
