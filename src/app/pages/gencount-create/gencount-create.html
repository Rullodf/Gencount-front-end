<div class="page">
  <div class="card">
    <h2 class="title">Crea Gencount</h2>

    <form [formGroup]="form" (ngSubmit)="submit()" class="form">
      <label class="label">Nome</label>
      <input class="input" type="text" formControlName="name" placeholder="Es. Viaggio a Cosenza"/>

      <label class="label">Descrizione</label>
      <textarea class="input textarea surface-variant on-surface" formControlName="description"
                placeholder="Es. spese weekend, cibo, benzina...">
        </textarea>

      <!-- TODO: mettere la disattivazione dopo click-->
      <button type="submit" class="btn create" >Crea Gencount</button>

      <button type="button" class="btn open-list" [class.listActive]="showAddPeople" (click)="toggleAddPeople()">
        Aggiungi amici al Gencount
      </button>
      <div class="peopleBoxWrapper" [class.open]="showAddPeople">
        <div class="peopleBox-sizer">
          <div class="peopleBox">
            <find-user (checkboxClicked)="addToAddingList($event)"/>
          </div>
        </div>
      </div>
    </form>
  </div>
</div>
