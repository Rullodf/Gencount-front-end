<div class="page">

  <div class="topbar">
    <div class="icon-btn">
      <button type="button" (click)="back()">
        <lucide-icon [img]="Undo2" style="top: 10px; left: 10px"></lucide-icon>
      </button>
    </div>

    <div class="title-and-description">
      <span class="title-span-above"></span>
      <div class="title">
        {{ gencount()?.name }}
      </div>
      <div class="description">
        {{ gencount()?.description }}
      </div>
    </div>
  </div>

  <div class="content">
    <div class="left sub-window" [class.dark]="themeService.isDark()">
      @if (gencount()) {
        <expenses-tabs-full-window [gencount]="gencount()!" [partecipants]="users()!"/>
      }
    </div>

    <div class="right sub-window">
      <div class="section-title">
        LISTA USERS IN QUESTO GENCOUNT
      </div>

      <div class="users-box">
        @for (user of users(); track user.userId) {
          <div class="user-line">
            <div>{{ user.name }} {{ user.surname }}</div>
          </div>
        }
      </div>
    </div>
  </div>
</div>
